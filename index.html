<!DOCTYPE html>
<html>
<body>
    <h2>Model Checker</h2>
    <input type="password" id="apiKey" placeholder="Paste API Key here" style="width: 300px; padding: 10px;">
    <button onclick="checkModels()" style="padding: 10px;">Check Available Models</button>
    <pre id="output" style="background: #eee; padding: 10px; margin-top: 10px;"></pre>

    <script>
        async function checkModels() {
            const key = document.getElementById('apiKey').value.trim();
            const output = document.getElementById('output');
            output.innerText = "Checking...";
            
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${key}`);
                const data = await response.json();
                
                if (data.error) throw new Error(data.error.message);

                // Filter out only the models that support 'generateContent'
                const validModels = data.models
                    .filter(m => m.supportedGenerationMethods.includes("generateContent"))
                    .map(m => m.name);
                
                output.innerText = "Supported models for your key:\n\n" + validModels.join('\n');
            } catch (err) {
                output.innerText = "Error: " + err.message;
            }
        }
    </script>
</body>
</html>
